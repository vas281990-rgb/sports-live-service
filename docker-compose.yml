
services:
  api:
    build: .
    container_name: sports_live_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
  worker:
    build: .
    container_name: sports_live_worker
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info
    volumes:
      - .:/code
    depends_on:
      - db
      - redis
    env_file:
      - .env
  db:
    image: postgres:16
    container_name: sports_live_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sports_live_db
    ports:
      - "5433:5432"
  redis:
    image: redis:7
    container_name: sports_live_redis
    ports:
      - "6379:6379"